name: warehouse

services:
  db:
    image: postgres:18-alpine
    container_name: warehouse-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: warehouse
    ports:
      - "5433:5432"
    volumes:
      - pg-data:/var/lib/postgresql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d warehouse" ]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
  
  api:
    build: .
    container_name: warehouse-api
    ports:
      - "8081:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=warehouse;Username=postgres;Password=postgres
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pg-data: